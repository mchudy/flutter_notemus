name: flutter_notemus
description: "Professional music notation rendering for Flutter. SMuFL-compliant with 2932 Bravura glyphs, beams, dynamics, articulations, and JSON import/export."
version: 2.5.0
license: Apache-2.0
homepage: https://github.com/alessonqueirozdev-hub
repository: https://github.com/alessonqueirozdev-hub/flutter_notemus
issue_tracker: https://github.com/alessonqueirozdev-hub/flutter_notemus/issues

topics:
  - flutter
  - music
  - notation
  - rendering
  - smufl

screenshots:
  - description: 'Complete music score with professional engraving, dynamics, and proper spacing'
    path: assets/readme/Captura de tela 2025-11-06 141401.png
  - description: 'Detailed musical elements with SMuFL glyphs, dotted notes, and breath marks'
    path: assets/readme/Captura de tela 2025-11-06 141533.png

environment:
  sdk: ^3.8.1
  flutter: ">=3.0.0"

dependencies:
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  xml: ^6.5.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.alessonqueiroz.flutternotemus
        pluginClass: FlutterNotemusPlugin
      ios:
        pluginClass: FlutterNotemusPlugin
      linux:
        pluginClass: FlutterNotemusPlugin
      macos:
        pluginClass: FlutterNotemusPlugin
      web:
        pluginClass: FlutterNotemusWeb
        fileName: flutter_notemus_web.dart
      windows:
        pluginClass: FlutterNotemusPluginCApi
  # Expose package assets to applications that depend on this plugin.
  assets:
    - assets/smufl/bravura_metadata.json
    - assets/smufl/glyphnames.json

  # Declare Bravura font for SMuFL rendering.
  fonts:
    - family: Bravura
      fonts:
        - asset: assets/smufl/Bravura.otf
